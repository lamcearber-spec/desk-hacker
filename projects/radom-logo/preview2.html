<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 30px;
    }
    h1 { 
      text-align: center; 
      margin-bottom: 30px;
      color: #FFD700;
      font-size: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      max-width: 800px;
      margin: 0 auto;
    }
    .option {
      background: #252540;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .option h2 {
      color: #9CA3AF;
      font-size: 13px;
      margin-bottom: 15px;
    }
    .option img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>⛰️ V4 & V5 — Cleaner, no extra lines</h1>
  
  <div class="grid">
    <div class="option">
      <h2>V4 — Clean Peak + R Leg</h2>
      <img src="logo-v4.svg">
    </div>
    <div class="option">
      <h2>V5 — R in Negative Space</h2>
      <img src="logo-v5.svg">
    </div>
  </div>
</body>
</html>
