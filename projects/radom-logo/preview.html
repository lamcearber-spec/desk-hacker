<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Radom UG Logo Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 30px;
    }
    h1 { 
      text-align: center; 
      margin-bottom: 30px;
      color: #FFD700;
      font-size: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .option {
      background: #252540;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .option h2 {
      color: #9CA3AF;
      font-size: 14px;
      margin-bottom: 15px;
      font-weight: 500;
    }
    .option img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .white-bg {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-top: 30px;
    }
    .white-bg h2 {
      color: #333;
      text-align: center;
      margin-bottom: 20px;
      font-size: 16px;
    }
    .white-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
  </style>
</head>
<body>
  <h1>⛰️ RADOM UG — Logo Concepts</h1>
  
  <div class="grid">
    <div class="option">
      <h2>V1 — Bold Mountain-R</h2>
      <img src="logo-v1.svg" alt="Logo V1">
    </div>
    <div class="option">
      <h2>V2 — Ridged Peak</h2>
      <img src="logo-v2.svg" alt="Logo V2">
    </div>
    <div class="option">
      <h2>V3 — Minimal Iconic</h2>
      <img src="logo-v3.svg" alt="Logo V3">
    </div>
  </div>
</body>
</html>
