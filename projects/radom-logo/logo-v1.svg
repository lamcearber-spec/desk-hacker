<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <linearGradient id="darkYellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E6B800"/>
      <stop offset="100%" style="stop-color:#CC8400"/>
    </linearGradient>
  </defs>
  
  <!-- Background (optional - remove for transparent) -->
  <rect width="400" height="300" fill="#1a1a2e"/>
  
  <!-- Main Mountain (forms the R) -->
  <polygon points="200,40 320,220 280,220 230,130 230,220 190,220 190,130 80,220 40,220" fill="url(#yellowGrad)"/>
  
  <!-- Shadow/depth on right side -->
  <polygon points="200,40 320,220 280,220 230,130 230,220 200,220 200,80" fill="url(#darkYellow)" opacity="0.6"/>
  
  <!-- R leg kick -->
  <polygon points="220,150 280,220 240,220 195,165" fill="url(#yellowGrad)"/>
  
  <!-- Text -->
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFD700" text-anchor="middle" letter-spacing="8">RADOM</text>
</svg>